<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0d0d18"/>
  <title>Persona — Planner</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>
<div class="app-shell">

  <header class="app-header">
    <div>
      <div class="header-title"><svg class="line-icon" style="width:22px;height:22px"><use href="#icon-calendar"></use></svg> Planner</div>
      <div class="header-subtitle" id="planner-date"></div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="window.location='/'" title="AI Schedule"><svg class="line-icon" style="width:18px;height:18px"><use href="#icon-globe"></use></svg></button>
    </div>
  </header>

  <main class="page-content">
    
    <!-- Horizon Date Scroller -->
    <div class="date-scroller" id="date-scroller" style="margin-bottom:16px; margin-top:5px; margin-left:-20px; margin-right:-20px; padding: 0 20px 10px 20px;"></div>

    <!-- Auto-schedule banner -->
    <div class="ai-plan-card" style="margin-bottom:14px">
      <div class="ai-plan-header">
        <span class="ai-plan-icon"><svg class="line-icon" style="width:20px;height:20px;stroke:#7CC6FE"><use href="#icon-globe"></use></svg></span>
        <span class="ai-plan-title">AI Smart Scheduler</span>
      </div>
      <div class="ai-plan-text" id="ai-plan-text">Tap below to let Gemini AI plan your entire week intelligently.</div>
      <div style="margin-top:10px">
        <button class="btn btn-primary btn-sm" onclick="aiSchedule()"><svg class="line-icon" style="width:14px;height:14px"><use href="#icon-bot"></use></svg> AI Schedule My Tasks</button>
      </div>
    </div>

    <!-- Day/Week toggle -->
    <div class="tab-pills" style="margin-bottom:16px">
      <button class="tab-pill active" onclick="switchView('day',this)">Day</button>
      <button class="tab-pill" onclick="switchView('week',this)">Week</button>
    </div>

    <!-- Filter chips -->
    <div class="tab-pills" id="status-filter">
      <button class="tab-pill active" onclick="filterTasks('',this)">All</button>
      <button class="tab-pill" onclick="filterTasks('pending',this)">Pending</button>
      <button class="tab-pill" onclick="filterTasks('in_progress',this)">In Progress</button>
      <button class="tab-pill" onclick="filterTasks('completed',this)">Done</button>
    </div>

    <!-- Timeline View -->
    <div id="timeline-view">
      <div class="section-head" style="margin-bottom:10px">
        <span class="section-title">Daily Timeline</span>
        <button class="btn btn-secondary btn-sm" style="padding:4px 10px;font-size:12px" onclick="openClassFAB()">+ Add Class</button>
      </div>
      <div id="timeline-slots" style="margin-left:16px"></div>
    </div>

    <!-- Week View (hidden) -->
    <div id="week-view" style="display:none">
      <div class="section-title" style="margin-bottom:10px">This Week</div>
      <div id="week-grid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px"></div>
    </div>

    <!-- Task list -->
    <div class="section-head" style="margin-top:20px">
      <span class="section-title">All Tasks</span>
      <span id="task-count" style="font-size:12px;color:var(--text-muted)"></span>
    </div>
    <div class="card card-sm" id="task-list-wrap"></div>

  </main>

  <!-- FAB -->
  <button class="fab" id="fab" onclick="toggleFAB()">+</button>

  <!-- AI bubble -->
  <div class="ai-bubble">
    <button class="ai-btn sticker" onclick="aiSchedule()" title="AI Schedule"><svg class="line-icon" style="stroke:#fff"><use href="#icon-globe"></use></svg></button>
  </div>
</div>

<!-- Add Task Sheet -->
<div class="sheet-backdrop" id="task-backdrop" onclick="closeFAB()"></div>
<div class="bottom-sheet" id="task-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="sheet-title"><svg class="line-icon" style="width:18px"><use href="#icon-plus"></use></svg> New Task</span>
    <button class="sheet-close" onclick="closeFAB()"><svg class="line-icon" style="width:20px"><use href="#icon-x"></use></svg></button>
  </div>
  <div class="sheet-body">
    <input type="hidden" id="edit-task-id"/>
    <div class="form-group"><label>Title *</label><input type="text" id="task-title" placeholder="Task title"/></div>
    <div class="form-row">
      <div class="form-group"><label>Priority</label>
        <select id="task-priority">
          <option value="medium">Medium</option>
          <option value="high">High</option>
          <option value="urgent">Urgent</option>
          <option value="low">Low</option>
        </select>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="task-status">
          <option value="pending">⏳ Pending</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Done</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Start</label><input type="datetime-local" id="task-start"/></div>
      <div class="form-group"><label>End</label><input type="datetime-local" id="task-end"/></div>
    </div>
    <div class="form-group"><label>Description</label><textarea id="task-desc" placeholder="Details…"></textarea></div>
  </div>
  <div class="sheet-footer">
    <button class="btn btn-secondary" onclick="closeFAB()">Cancel</button>
    <button class="btn btn-primary" onclick="saveTask()"><svg class="line-icon" style="width:18px"><use href="#icon-check"></use></svg> Save</button>
  </div>
</div>

<div class="toast-container" id="toast-container"></div>
<script src="js/auth-guard.js"></script>
<script src="js/app.js"></script>
<script src="js/clock-nav.js"></script>
<script src="js/planner.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => { initApp(); initPlanner(); });

  let fabOpen = false;
  function toggleFAB() {
    fabOpen = !fabOpen;
    document.getElementById('edit-task-id').value = '';
    document.getElementById('sheet-title').innerHTML = '<svg class="line-icon" style="width:18px"><use href="#icon-plus"></use></svg> New Task';
    ['task-title','task-desc'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('task-priority').value = 'medium';
    document.getElementById('task-status').value   = 'pending';
    document.getElementById('task-start').value = document.getElementById('task-end').value = '';
    document.getElementById('fab').classList.toggle('open', fabOpen);
    document.getElementById('task-sheet').classList.toggle('show', fabOpen);
    document.getElementById('task-backdrop').classList.toggle('show', fabOpen);
  }
  function closeFAB() {
    fabOpen = false;
    document.getElementById('fab').classList.remove('open');
    document.getElementById('task-sheet').classList.remove('show');
    document.getElementById('task-backdrop').classList.remove('show');
  }

  /* Class / Timetable Sheet */
  function openClassFAB() {
    document.getElementById('class-sheet').classList.add('show');
    document.getElementById('task-backdrop').classList.add('show');
  }
  function closeClassFAB() {
    document.getElementById('class-sheet').classList.remove('show');
    document.getElementById('task-backdrop').classList.remove('show');
    document.getElementById('edit-class-id').value = '';
    ['class-label','class-start','class-end'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('class-modal-title').innerHTML = '<svg class="line-icon" style="width:18px"><use href="#icon-plus"></use></svg> Add Class';
  }

  async function aiSchedule() {
    const txt = document.getElementById('ai-plan-text');
    txt.textContent = 'Thinking about your tasks…';
    try {
      const res = await API.post('/scheduler/auto-schedule', {});
      txt.textContent = res.explanation || 'Tasks scheduled!';
      showToast('success', 'AI Scheduled!', res.message);
      loadData();
    } catch(e) {
      txt.textContent = 'Set GEMINI_API_KEY in backend/.env to enable AI scheduling.';
      showToast('error','AI Error', e.message);
    }
  }
</script>

<!-- Add Class Sheet -->
<div class="bottom-sheet" id="class-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-header">
    <span class="sheet-title" id="class-modal-title"><svg class="line-icon" style="width:18px"><use href="#icon-plus"></use></svg> Add Class</span>
    <button class="sheet-close" onclick="closeClassFAB()"><svg class="line-icon" style="width:20px"><use href="#icon-x"></use></svg></button>
  </div>
  <div class="sheet-body">
    <input type="hidden" id="edit-class-id"/>
    <div class="form-group">
      <label>Label / Course Name *</label>
      <input type="text" id="class-label" placeholder="e.g. Computer Science 101" required/>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Day of Week *</label>
        <select id="class-day" required>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="class-type">
          <option value="Lecture / Class">Lecture / Class</option>
          <option value="Lab">Lab</option>
          <option value="Seminar">Seminar</option>
          <option value="Work / Job">Work / Job</option>
          <option value="Other">Other</option>
        </select>
      </div>
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>Start Time *</label>
        <input type="time" id="class-start" required/>
      </div>
      <div class="form-group">
        <label>End Time *</label>
        <input type="time" id="class-end" required/>
      </div>
    </div>
  </div>
  <div class="sheet-footer" style="display:flex; justify-content:space-between; align-items:center;">
    <button class="btn btn-secondary" onclick="closeClassFAB()">Cancel</button>
    <div style="display:flex; gap:10px;">
      <button class="btn btn-danger btn-sm btn-icon" title="Delete" onclick="deleteClassId()"><svg class="line-icon" style="width:18px"><use href="#icon-trash"></use></svg></button>
      <button class="btn btn-primary" onclick="saveClass()"><svg class="line-icon" style="width:18px"><use href="#icon-check"></use></svg> Save Block</button>
    </div>
  </div>
</div>
</body>
</html>

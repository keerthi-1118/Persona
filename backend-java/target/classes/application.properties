# ============================================================
# Persona PWA — Spring Boot Configuration
# Mirrors the Python .env file
# ============================================================

server.port=5000

# ── Session ─────────────────────────────────────────────────
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Lax
server.servlet.session.timeout=30d
spring.session.store-type=none

# ── SQLite Database ──────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:../database/persona.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── App Config ───────────────────────────────────────────────
persona.secret-key=persona-change-this-in-production
persona.frontend-dir=../frontend

# ── Gemini AI ────────────────────────────────────────────────
persona.gemini-api-key=AIzaSyA4birksAI9FPQPY6H8wopn5-B4CUeBQKs

# ── Google OAuth ─────────────────────────────────────────────
persona.google-client-id=your-google-client-id-here
persona.google-client-secret=your-google-client-secret-here
persona.google-redirect-uri=http://localhost:5000/api/auth/google/callback


# ── Web Push (VAPID) ─────────────────────────────────────────
persona.vapid-private-key=your_vapid_private_key_here
persona.vapid-public-key=your_vapid_public_key_here
persona.vapid-claims-email=mailto:admin@persona.app

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──────────────────────────────────────────────────
logging.level.com.persona=INFO
logging.level.org.springframework.web=WARN

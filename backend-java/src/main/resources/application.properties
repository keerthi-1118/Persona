# ============================================================
# Persona PWA — Spring Boot Configuration
# Mirrors the Python .env file
# ============================================================

server.port=5000

# ── Session ─────────────────────────────────────────────────
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Lax
server.servlet.session.timeout=30d
spring.session.store-type=none

# ── Database Configuration (PostgreSQL — production only) ──────
# Set DATABASE_URL on Render or SPRING_DATASOURCE_URL locally.
# Example local URL: jdbc:postgresql://localhost:5432/persona
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/persona}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL:5}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── App Config ───────────────────────────────────────────────
persona.secret-key=persona-change-this-in-production
persona.frontend-dir=../frontend

# ── Gemini AI ────────────────────────────────────────────────
# Set PERSONA_GEMINI_API_KEY as an environment variable on Render
persona.gemini-api-key=${PERSONA_GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}

# ── Google OAuth ─────────────────────────────────────────────
persona.google-client-id=your-google-client-id-here
persona.google-client-secret=your-google-client-secret-here
persona.google-redirect-uri=http://localhost:5000/api/auth/google/callback


# ── Web Push (VAPID) ─────────────────────────────────────────
persona.vapid-private-key=your_vapid_private_key_here
persona.vapid-public-key=your_vapid_public_key_here
persona.vapid-claims-email=mailto:admin@persona.app

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──────────────────────────────────────────────────
logging.level.com.persona=INFO
logging.level.org.springframework.web=WARN

# ── Reverse Proxy / Load Balancer Support ─────────────────────
server.forward-headers-strategy=FRAMEWORK


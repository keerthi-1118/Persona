# ============================================================
# Persona PWA — Spring Boot Configuration
# Mirrors the Python .env file
# ============================================================

server.port=${PORT:5000}

# ── Session ─────────────────────────────────────────────────
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=Lax
server.servlet.session.timeout=30d
spring.session.store-type=none

# ── Database Configuration (PostgreSQL) ──────────────────────────
# DatabaseUrlPostProcessor.java auto-converts Render's DATABASE_URL
# before Spring reads this file. This fallback is for local dev only.
spring.datasource.url=${spring.datasource.url:jdbc:postgresql://localhost:5432/persona}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL:5}
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ── App Config ───────────────────────────────────────────────
persona.secret-key=persona-change-this-in-production
persona.frontend-dir=../frontend

# ── Gemini AI ────────────────────────────────────────────────
# Set PERSONA_GEMINI_API_KEY as an environment variable on Render
persona.gemini-api-key=${PERSONA_GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}

# ── Google OAuth ─────────────────────────────────────────────
# These are already set as env vars on Render
persona.google-client-id=${PERSONA_GOOGLE_CLIENT_ID:your-google-client-id-here}
persona.google-client-secret=${PERSONA_GOOGLE_CLIENT_SECRET:your-google-client-secret-here}
persona.google-redirect-uri=${PERSONA_GOOGLE_REDIRECT_URI:http://localhost:5000/api/auth/google/callback}


# ── Web Push (VAPID) ─────────────────────────────────────────
persona.vapid-private-key=your_vapid_private_key_here
persona.vapid-public-key=your_vapid_public_key_here
persona.vapid-claims-email=mailto:admin@persona.app

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ──────────────────────────────────────────────────
logging.level.com.persona=INFO
logging.level.org.springframework.web=WARN

# ── Reverse Proxy / Load Balancer Support ─────────────────────
server.forward-headers-strategy=FRAMEWORK

